# =============================================================================
# SealProof — Docker Compose (Full Stack)
# =============================================================================
# Usage:
#   docker-compose -f deploy/docker/docker-compose.yml up -d
#
# For development, override with:
#   docker-compose -f deploy/docker/docker-compose.yml -f deploy/docker/docker-compose.dev.yml up
# =============================================================================

version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sealproof
      POSTGRES_USER: sealproof_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sealproof_app -d sealproof"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend Services (all 15 microservices in one container)
  # ---------------------------------------------------------------------------
  services:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.services
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://sealproof_app:${DB_PASSWORD:-changeme}@postgres:5432/sealproof
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "4001-4015:4001-4015"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend Apps
  # ---------------------------------------------------------------------------
  customer-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.customer-web
    env_file:
      - ../../apps/customer-web/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - services
    restart: unless-stopped

  notary-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.notary-web
    env_file:
      - ../../apps/notary-web/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - services
    restart: unless-stopped

  admin-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin-web
    env_file:
      - ../../apps/admin-web/.env
    environment:
      NODE_ENV: production
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - services
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reverse Proxy (nginx)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/sealproof.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - customer-web
      - notary-web
      - admin-web
      - services
    restart: unless-stopped

  # SSL cert renewal
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-conf:
