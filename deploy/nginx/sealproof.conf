# =============================================================================
# SealProof — nginx Reverse Proxy Configuration
# =============================================================================
# Domains:
#   sealproof.ai         → customer-web (Next.js, port 3000)
#   notary.sealproof.ai  → notary-web   (Next.js, port 3001)
#   admin.sealproof.ai   → admin-web    (Next.js, port 3002)
#   api.sealproof.ai     → api-gateway  (Express, port 4013)
#
# Microservice API routes proxied internally via /api/v1/*
# LiveKit WebSocket upgrade handled for video sessions
# SSL via Let's Encrypt (certbot)
# =============================================================================

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=kyc:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=50r/s;

# --- Upstream definitions ---
upstream customer_web    { server 127.0.0.1:3000; }
upstream notary_web      { server 127.0.0.1:3001; }
upstream admin_web       { server 127.0.0.1:3002; }

# Backend microservices
upstream notary_commission_svc   { server 127.0.0.1:4001; }
upstream notary_roster_svc       { server 127.0.0.1:4002; }
upstream session_orchestrator    { server 127.0.0.1:4003; }
upstream kyc_svc                 { server 127.0.0.1:4004; }
upstream livekit_bridge_svc      { server 127.0.0.1:4005; }
upstream esign_bridge_svc        { server 127.0.0.1:4006; }
upstream journal_svc             { server 127.0.0.1:4007; }
upstream recording_svc           { server 127.0.0.1:4008; }
upstream seal_applicator_svc     { server 127.0.0.1:4009; }
upstream payment_svc             { server 127.0.0.1:4010; }
upstream notification_svc        { server 127.0.0.1:4011; }
upstream audit_export_svc        { server 127.0.0.1:4012; }
upstream api_gateway_svc         { server 127.0.0.1:4013; }
upstream webhook_svc             { server 127.0.0.1:4014; }
upstream tenant_svc              { server 127.0.0.1:4015; }

# =============================================================================
# HTTP → HTTPS redirect (all domains)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name sealproof.ai notary.sealproof.ai admin.sealproof.ai api.sealproof.ai;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Customer Web — sealproof.ai
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sealproof.ai www.sealproof.ai;

    ssl_certificate     /etc/letsencrypt/live/sealproof.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealproof.ai/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://clerk.sealproof.ai https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.sealproof.ai wss://*.livekit.cloud https://*.clerk.accounts.dev; media-src 'self' blob:; frame-src https://withpersona.com https://*.clerk.accounts.dev;" always;

    # Static assets with long cache
    location /_next/static/ {
        proxy_pass http://customer_web;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # API routes → backend services
    location /api/sessions {
        limit_req zone=api_global burst=10 nodelay;
        proxy_pass http://session_orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/kyc {
        limit_req zone=kyc burst=5 nodelay;
        proxy_pass http://kyc_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payments {
        limit_req zone=api_global burst=5 nodelay;
        proxy_pass http://payment_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/livekit {
        proxy_pass http://livekit_bridge_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support for LiveKit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /api/esign {
        proxy_pass http://esign_bridge_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (real-time updates)
    location /socket.io/ {
        proxy_pass http://session_orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://customer_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File upload size (documents up to 50MB)
    client_max_body_size 50M;
}

