# =============================================================================
# Public API — api.sealproof.ai
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sealproof.ai;

    ssl_certificate     /etc/letsencrypt/live/sealproof.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealproof.ai/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # All API traffic → api-gateway-svc
    location / {
        limit_req zone=api_global burst=20 nodelay;
        proxy_pass http://api_gateway_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook ingress (higher rate limit)
    location /webhooks/ {
        limit_req zone=webhook burst=30 nodelay;
        proxy_pass http://api_gateway_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10M;
}

# =============================================================================
# Health check endpoint (internal, no SSL needed)
# =============================================================================
server {
    listen 8080;
    server_name localhost;

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
